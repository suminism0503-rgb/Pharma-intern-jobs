<body>

        <header>
            <h1>🏥 제약회사 인턴 공고</h1>
            <p class="subtitle">최신 제약업계 인턴십 정보를 한눈에</p>
            <div class="update-info">
                마지막 업데이트: <span id="lastUpdate">2026-03-29 01:59:36</span>
            </div>
        </header>

        <div class="search-section">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="회사명, 직무, 지역 검색...">
                <button onclick="searchJobs()">🔍 검색</button>
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label>회사:</label>
                    <select id="companyFilter" onchange="applyFilters()">
                        <option value="">전체</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>지역:</label>
                    <select id="locationFilter" onchange="applyFilters()">
                        <option value="">전체</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>출처:</label>
                    <select id="sourceFilter" onchange="applyFilters()">
                        <option value="">전체</option>
                        <option value="saramin">사람인</option>
                        <option value="jobkorea">잡코리아</option>
                        <option value="incruit">인크루트</option>
                    </select>
                </div>

                <button class="btn-secondary" onclick="resetFilters()">필터 초기화</button>
                <button class="btn-bookmarks" onclick="showBookmarks()">
                    ⭐ 북마크 (<span id="bookmarkCount">0</span>)
                </button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-number" id="totalJobs">10</span>
                <span class="stat-label">전체 공고</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="displayedJobs">10</span>
                <span class="stat-label">표시 중</span>
            </div>
        </div>

        <div id="jobsList" class="jobs-list"></div>

        <div id="noResults" class="no-results" style="display: none;">
            <p>검색 결과가 없습니다. 😢</p>
            <p>다른 검색어나 필터를 시도해보세요.</p>
        </div>
    </div>

    <div id="jobModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>

    </div>

    },
    {

      "type": "인턴",
      "deadline": "2026-03-12",
      "posted_date": "2026-02-07",
      "url": "https://www.incruit.com/job/010",
      "description": "의약품 허가 관련 서류 작성 및 민원 업무",
      "requirements": [
        "약학 전공",

        let allJobs = [];
        let filteredJobs = [];
        let bookmarkedJobs = new Set();

        document.addEventListener('DOMContentLoaded', () => {
            loadBookmarks();
            loadJobsData();
        });

        function loadBookmarks() {
            const saved = localStorage.getItem('pharmaJobBookmarks');
            if (saved) {
                bookmarkedJobs = new Set(JSON.parse(saved));
            }
            updateBookmarkCount();
        }

        function saveBookmarks() {
            localStorage.setItem('pharmaJobBookmarks', JSON.stringify([...bookmarkedJobs]));
            updateBookmarkCount();
        }

        function updateBookmarkCount() {
            document.getElementById('bookmarkCount').textContent = bookmarkedJobs.size;
        }

        function loadJobsData() {
            allJobs = jobsData.jobs;
            filteredJobs = [...allJobs];
            
            populateFilters();
            displayJobs(filteredJobs);
            updateStats();
        }

        function populateFilters() {
            const companies = [...new Set(allJobs.map(job => job.company))].sort();
            const companyFilter = document.getElementById('companyFilter');
            companies.forEach(company => {
                const option = document.createElement('option');
                option.value = company;
                option.textContent = company;
                companyFilter.appendChild(option);
            });
            
            const locations = [...new Set(allJobs.map(job => job.location))].sort();
            const locationFilter = document.getElementById('locationFilter');
            locations.forEach(location => {
                const option = document.createElement('option');
                option.value = location;
                option.textContent = location;
                locationFilter.appendChild(option);
            });
        }

        function displayJobs(jobs) {
            const jobsList = document.getElementById('jobsList');
            const noResults = document.getElementById('noResults');
            
            if (jobs.length === 0) {
                jobsList.style.display = 'none';
                noResults.style.display = 'block';
                return;
            }
            
            jobsList.style.display = 'grid';
            noResults.style.display = 'none';
            
            jobsList.innerHTML = jobs.map(job => createJobCard(job)).join('');
            document.getElementById('displayedJobs').textContent = jobs.length;
        }

        function createJobCard(job) {
            const isBookmarked = bookmarkedJobs.has(job.id);
            const bookmarkIcon = isBookmarked ? '⭐' : '☆';
            const daysLeft = calculateDaysLeft(job.deadline);
            
            return `
                <div class="job-card ${isBookmarked ? 'bookmarked' : ''}" data-job-id="${job.id}">
                    <button class="bookmark-btn" onclick="toggleBookmark('${job.id}', event)">
                        ${bookmarkIcon}
                    </button>
                    
                    <div class="job-header" onclick="showJobDetail('${job.id}')">
                        <div class="company-name">${job.company}</div>
                        <div class="job-title">${job.title}</div>
                    </div>
                    
                    <div class="job-meta">
                        <span class="meta-tag location">📍 ${job.location}</span>
                        <span class="meta-tag deadline">⏰ D-${daysLeft}</span>
                        <span class="meta-tag source">${getSourceName(job.source)}</span>
                    </div>
                    
                    <div class="job-description" onclick="showJobDetail('${job.id}')">
                        ${job.description}
                    </div>
                    
                    <div class="job-footer">
                        <span class="posted-date">게시일: ${job.posted_date}</span>
                        <a href="#" class="view-details" onclick="showJobDetail('${job.id}'); return false;">
                            자세히 보기 →
                        </a>
                    </div>
                </div>
            `;
        }

        function getSourceName(source) {
            const names = {
                'saramin': '사람인',
                'jobkorea': '잡코리아',
                'incruit': '인크루트'
            };
            return names[source] || source;
        }

        function calculateDaysLeft(deadline) {
            const today = new Date();
            const deadlineDate = new Date(deadline);
            const diffTime = deadlineDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays > 0 ? diffDays : 0;
        }

        function toggleBookmark(jobId, event) {
            event.stopPropagation();
            
            if (bookmarkedJobs.has(jobId)) {
                bookmarkedJobs.delete(jobId);
            } else {
                bookmarkedJobs.add(jobId);
            }
            
            saveBookmarks();
            
            const card = document.querySelector(`[data-job-id="${jobId}"]`);
            const btn = card.querySelector('.bookmark-btn');
            
            if (bookmarkedJobs.has(jobId)) {
                card.classList.add('bookmarked');
                btn.textContent = '⭐';
            } else {
                card.classList.remove('bookmarked');
                btn.textContent = '☆';
            }
        }

        function showBookmarks() {
            if (bookmarkedJobs.size === 0) {
                alert('북마크한 공고가 없습니다.');
                return;
            }
            
            const bookmarked = allJobs.filter(job => bookmarkedJobs.has(job.id));
            filteredJobs = bookmarked;
            displayJobs(bookmarked);
            
            document.getElementById('searchInput').value = '';
            document.getElementById('companyFilter').value = '';
            document.getElementById('locationFilter').value = '';
            document.getElementById('sourceFilter').value = '';
        }

        function searchJobs() {
            applyFilters();
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchJobs();
            }
        });

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const companyFilter = document.getElementById('companyFilter').value;
            const locationFilter = document.getElementById('locationFilter').value;
            const sourceFilter = document.getElementById('sourceFilter').value;
            
            filteredJobs = allJobs.filter(job => {
                const matchesSearch = !searchTerm || 
                    job.company.toLowerCase().includes(searchTerm) ||
                    job.title.toLowerCase().includes(searchTerm) ||
                    job.location.toLowerCase().includes(searchTerm) ||
                    job.description.toLowerCase().includes(searchTerm);
                
                const matchesCompany = !companyFilter || job.company === companyFilter;
                const matchesLocation = !locationFilter || job.location === locationFilter;
                const matchesSource = !sourceFilter || job.source === sourceFilter;
                
                return matchesSearch && matchesCompany && matchesLocation && matchesSource;
            });
            
            displayJobs(filteredJobs);
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('companyFilter').value = '';
            document.getElementById('locationFilter').value = '';
            document.getElementById('sourceFilter').value = '';
            
            filteredJobs = [...allJobs];
            displayJobs(filteredJobs);
        }

        function updateStats() {
            document.getElementById('totalJobs').textContent = allJobs.length;
            document.getElementById('displayedJobs').textContent = filteredJobs.length;
        }

        function showJobDetail(jobId) {
            const job = allJobs.find(j => j.id === jobId);
            if (!job) return;
            
            const isBookmarked = bookmarkedJobs.has(jobId);
            const bookmarkIcon = isBookmarked ? '⭐' : '☆';
            const bookmarkText = isBookmarked ? '북마크 해제' : '북마크 추가';
            
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="modal-header">
                    <div class="modal-company">${job.company}</div>
                    <div class="modal-title">${job.title}</div>
                    
                    <div class="modal-meta">
                        <span class="meta-tag location">📍 ${job.location}</span>
                        <span class="meta-tag">💼 ${job.type}</span>
                        <span class="meta-tag deadline">마감: ${job.deadline}</span>
                        <span class="meta-tag source">${getSourceName(job.source)}</span>
                    </div>
                </div>
                
                <div class="modal-section">
                    <h3>📋 채용 내용</h3>
                    <p>${job.description}</p>
                </div>
                
                <div class="modal-section">
                    <h3>✅ 지원 자격</h3>
                    <ul class="requirements-list">
                        ${job.requirements.map(req => `<li>${req}</li>`).join('')}
                    </ul>
                </div>
                
                <div class="modal-section">
                    <h3>📅 채용 정보</h3>
                    <p>
                        <strong>게시일:</strong> ${job.posted_date}<br>
                        <strong>마감일:</strong> ${job.deadline} (D-${calculateDaysLeft(job.deadline)})<br>
                        <strong>지역:</strong> ${job.location}
                    </p>
                </div>
                
                <div class="modal-actions">
                    <a href="${job.url}" target="_blank" class="btn-apply">
                        지원하기 🚀
                    </a>
                    <button class="btn-bookmark-modal" onclick="toggleBookmark('${jobId}', event); updateModalBookmark('${jobId}')">
                        ${bookmarkIcon} ${bookmarkText}
                    </button>
                </div>
            `;
            
            document.getElementById('jobModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('jobModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('jobModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }

        function updateModalBookmark(jobId) {
            closeModal();
            showJobDetail(jobId);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
